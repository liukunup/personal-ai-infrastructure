id: api-v1-route
uri: /api/v1/*
name: api-v1-routes
priority: 10
vars: []
hosts:
  - api.example.com
methods:
  - GET
  - POST
  - PUT
  - DELETE
  - PATCH
  - OPTIONS
plugins:
  openid-connect:
    conf:
      $ref: "/etc/apisix/oidc/config.json"
    
    # 或者直接指定文件路径
    # conf_file: "/etc/apisix/oidc/oidc_config.json"
    
    # 请求级别配置
    request_headers:
      - "Authorization"
    response_headers:
      - "X-User-ID"
      - "X-User-Name"
    
    # JWT 验证选项
    verify_claims:
      iss: "https://keycloak.example.com/realms/master"
      aud: "account"
  
  casbin:
    model_file: "/etc/apisix/rbac/rbac_model.conf"
    policy_file: "/etc/apisix/rbac/rbac_policy.csv"
    
    # 用户标识字段（从 JWT token 中提取）
    username_from_claim: "preferred_username"
    
    # 角色字段（从 JWT token 中提取，可选）
    roles_from_claim: "roles"
    
    # 权限检查失败时的行为
    unauthorized_action: "reject"  # 或 "allow"
    
    # 缓存配置
    cache:
      enabled: true
      ttl: 300  # 5分钟
      capacity: 10000
    
    # 日志配置
    log:
      enabled: true
      level: "warn"  # debug, info, warn, error
    
    # 监控指标
    metrics:
      enabled: true
      prefix: "apisix_casbin"
  
  # 其他插件
  cors:
    allow_origins: "*"
    allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
    allow_headers: "Authorization,Content-Type"
    expose_headers: "X-User-ID,X-User-Name"
    max_age: 3600
  
  limit-req:
    rate: 100
    burst: 200
    key: remote_addr
    rejected_code: 429
  
  proxy-rewrite:
    uri: "/v1$uri"

- id: demo-nacos-route
  uri: /demo/*
  name: demo-service-route
  upstream:
    type: roundrobin
    pass_host: pass
    scheme: http
    nodes:
      "demo:8000": 100
    discovery_type: nacos
    service_name: demo-service
    discovery_args:
      group_name: DEFAULT_GROUP
    timeout:
      connect: 6
      send: 6
      read: 6
    retries: 3
  proxy-rewrite:
    uri: "/api/v1/echo"  # 重写到后端服务

upstream:
  type: roundrobin
  pass_host: pass
  scheme: http
  nodes:
    "backend-service-1:8080": 10
    "backend-service-2:8080": 10
  
  # 健康检查
  checks:
    active:
      type: http
      http_path: /health
      healthy:
        interval: 5
        successes: 2
      unhealthy:
        interval: 5
        http_failures: 3
  
  timeout:
    connect: 6
    send: 6
    read: 6
  
  retries: 3